<!DOCTYPE html>
<html lang="la">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="description" content="Memento mori: vitam tuam per octoginta annos, mensem post mensem, contemplare.">
<meta name="theme-color" content="#f7f6f4">
<title>Memento Mori</title>
<style>
/* Memento Mori — pagina una, sine ope externa.
   Anni in axe verticali, menses in horizontali. Tabula 9:16, sine scroll. */

:root {
  --ink: #111;
  --paper: #f7f6f4;
  --ring: #b9b7b2;
  --muted: #666;
  --error: #b23a3a;
  --dot: 9px;              /* a JavaScript pro spatio ponitur */
  --gutter: 1.7em;
  font-size: 13px;         /* basis pro unitatibus rem */
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  touch-action: manipulation;   /* nullum zoom per duplicem tactum */
}

body {
  background: var(--paper);
  color: var(--ink);
  font-family: Georgia, "Times New Roman", serif;
  display: flex;
  justify-content: center;
}

/* typographia communis */
.title {
  text-align: center;
  font-weight: 700;
  letter-spacing: .38em;
  padding-left: .38em;
  line-height: 1;
}
.subtitle {
  text-align: center;
  font-style: italic;
  color: #2a2a2a;
}

/* schermum principale */
.app {
  width: 100%;
  max-width: 720px;
  height: 100%;
  padding: 1rem 1.2rem .8rem;
  display: flex;
  flex-direction: column;
}
.head .title { font-size: 1.85rem; }
.head .subtitle { font-size: .98rem; margin-top: .5rem; }

.chart {
  flex: 1 1 auto;
  min-height: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

/* tabula: tituli et puncta in una grid ut congruant */
.matrix {
  display: grid;
  grid-template-columns: var(--gutter) repeat(12, 1fr);
  grid-template-rows: auto repeat(80, 1fr);
  align-items: center;
  justify-items: center;
}
.corner small {
  font-size: .42rem;
  letter-spacing: .02em;
  white-space: nowrap;
  color: var(--muted);
}
.mlabel { font-size: .56rem; color: #555; }
.ylabel {
  justify-self: end;
  padding-right: .5em;
  font-size: .54rem;
  color: #555;
}
.cell {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
}
.cell i {
  width: var(--dot);
  height: var(--dot);
  border-radius: 50%;
  border: 1px solid var(--ring);
  transition: background .18s, border-color .18s;
}
.cell.lived i, .cell.now i { background: var(--ink); border-color: var(--ink); }
.cell.now i { box-shadow: 0 0 0 2px var(--paper), 0 0 0 3px var(--ink); }

.caption {
  margin-top: .55rem;
  padding-left: .28em;
  font-size: .66rem;
  letter-spacing: .28em;
  color: #333;
}
.caption .arrow { color: #888; margin: 0 .4em; }

/* pyxis occulta ut dies mutetur */
.reset {
  position: fixed;
  top: 6px;
  right: 10px;
  border: none;
  background: none;
  font-family: inherit;
  font-size: .6rem;
  letter-spacing: .1em;
  color: #b3b1ac;
  cursor: pointer;
}

/* schermum initiale: dies natalis */
.intro {
  position: fixed;
  top: 0; right: 0; bottom: 0; left: 0;
  z-index: 20;
  background: #fff;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 2rem 1.4rem;
  text-align: center;
}
.intro.hidden { display: none; }
.intro .title { font-size: 1.7rem; }
.intro .subtitle { font-size: 1.02rem; margin-top: .5rem; }

.intro-form { margin-top: 2rem; }
.date-fields { font-size: 1.7rem; }
.field {
  display: inline-block;
  vertical-align: top;
  text-align: center;
}
.box {
  display: block;
  width: 2.3em;
  font-family: inherit;
  font-size: 1em;
  line-height: 1;
  color: var(--ink);
  text-align: center;
  background: transparent;
  border: none;
  border-bottom: 1px solid #d8d5cf;
  padding: .38em 0;
}
.field--year .box { width: 3.7em; }
.box:focus { outline: none; border-bottom-color: var(--ink); }
.box.invalid { border-bottom-color: var(--error); }
.flabel {
  display: block;
  margin-top: .55rem;
  font-size: .58rem;
  letter-spacing: .24em;
  text-transform: uppercase;
  color: var(--muted);
}
.sep {
  display: inline-block;
  vertical-align: top;
  margin: .4em .3rem 0;
  font-size: .95em;
  color: #d8d6d1;
}
.error {
  min-height: 1.1em;
  margin-top: 1.2rem;
  font-style: italic;
  font-size: .82rem;
  color: var(--error);
}
.submit {
  margin-top: 1.2rem;
  font-family: inherit;
  font-size: .78rem;
  letter-spacing: .34em;
  text-transform: uppercase;
  padding: .25rem 0 .35rem .34em;
  border: none;
  border-bottom: 1px solid var(--ink);
  background: none;
  color: var(--ink);
  cursor: pointer;
}
</style>
</head>
<body>

<main class="app">
  <header class="head">
    <h1 class="title">MEMENTO MORI</h1>
    <p class="subtitle">Vivamus, quia moriendum est.</p>
  </header>

  <section class="chart" id="chart">
    <div class="matrix" id="matrix" role="img" aria-label="Menses vitae per octoginta annos"></div>
    <p class="caption" id="caption">
      <span class="arrow">&larr;</span>ANNI (1&ndash;80)<span class="arrow">&rarr;</span>
    </p>
  </section>
</main>

<button class="reset" id="reset" type="button" hidden>mutare</button>

<div class="intro" id="intro">
  <h1 class="title">MEMENTO MORI</h1>
  <p class="subtitle">Vivamus, quia moriendum est.</p>
  <form class="intro-form" id="form" novalidate>
    <div class="date-fields"
      ><span class="field"><input class="box" id="day" inputmode="numeric" maxlength="2" placeholder="DD" autocomplete="off" aria-label="Dies"><span class="flabel">DIES</span></span
      ><span class="sep">/</span
      ><span class="field"><input class="box" id="month" inputmode="numeric" maxlength="2" placeholder="MM" autocomplete="off" aria-label="Mensis"><span class="flabel">MENSIS</span></span
      ><span class="sep">/</span
      ><span class="field field--year"><input class="box" id="year" inputmode="numeric" maxlength="4" placeholder="AAAA" autocomplete="off" aria-label="Annus"><span class="flabel">ANNUS</span></span
    ></div>
    <p class="error" id="error" role="alert"></p>
    <button class="submit" type="submit">Incipe</button>
  </form>
</div>

<script>
/* Ordines = anni vitae (1..80). Columnae = menses kalendarii (1..12).
   Quisque ordo unum annum kalendarii ab anno nativitatis repraesentat.
   Menses a die natali usque ad mensem currentem implentur; currens signatur.
   Dies natalis in localStorage servatur. */
(function () {
  "use strict";

  var YEARS = 80, MONTHS = 12;
  var KEY = "mementoMori.birth";
  var DOT_RATIO = 0.8;          // magnitudo puncti intra cellulam
  var MAX_WIDTH = 0.72;         // latitudo maxima tabulae (pars schermi)
  var ASPECT = 9 / 16;          // latitudo : altitudo (verticalis)
  var root = document.documentElement;

  var matrix = document.getElementById("matrix");
  var chart = document.getElementById("chart");
  var caption = document.getElementById("caption");
  var intro = document.getElementById("intro");
  var form = document.getElementById("form");
  var dayI = document.getElementById("day");
  var monI = document.getElementById("month");
  var yeaI = document.getElementById("year");
  var errorEl = document.getElementById("error");
  var resetB = document.getElementById("reset");

  var cells = [];
  var birthISO = null;

  // tabulam semel aedificare
  function build() {
    var frag = document.createDocumentFragment(), i, j, node, small;

    node = document.createElement("div");
    node.className = "corner";
    node.style.gridArea = "1 / 1";
    small = document.createElement("small");
    small.textContent = "MENSES";
    node.appendChild(small);
    frag.appendChild(node);

    for (i = 1; i <= MONTHS; i++) {
      node = document.createElement("div");
      node.className = "mlabel";
      node.style.gridArea = "1 / " + (i + 1);
      node.textContent = i;
      frag.appendChild(node);
    }

    for (i = 10; i <= YEARS; i += 10) {
      node = document.createElement("div");
      node.className = "ylabel";
      node.style.gridArea = (i + 1) + " / 1";
      node.textContent = i;
      frag.appendChild(node);
    }

    for (i = 1; i <= YEARS; i++) {
      for (j = 1; j <= MONTHS; j++) {
        node = document.createElement("div");
        node.className = "cell";
        node.style.gridArea = (i + 1) + " / " + (j + 1);
        node.appendChild(document.createElement("i"));
        cells.push(node);
        frag.appendChild(node);
      }
    }

    matrix.appendChild(frag);
  }

  // magnitudo tabulae (9:16) et puncti
  function layout() {
    var availW = chart.clientWidth;
    var availH = chart.clientHeight - caption.offsetHeight;
    if (availW <= 0 || availH <= 0) return;

    var W = Math.min(availW * MAX_WIDTH, (availH - 6) * ASPECT);
    var H = W / ASPECT;
    matrix.style.width = W + "px";
    matrix.style.height = H + "px";

    var cellW = (W - 30) / MONTHS;
    var cellH = (H - 14) / YEARS;
    var dot = Math.max(3, Math.floor(Math.min(cellW, cellH) * DOT_RATIO));
    root.style.setProperty("--dot", dot + "px");
  }

  // puncta pingere ex kalendario
  function paint() {
    if (!birthISO) return;
    var b = new Date(birthISO + "T00:00:00");
    var bY = b.getFullYear(), bM = b.getMonth();
    var now = new Date(), nY = now.getFullYear(), nM = now.getMonth();

    for (var r = 0; r < YEARS; r++) {
      var year = bY + r;
      for (var c = 0; c < MONTHS; c++) {
        var cell = cells[r * MONTHS + c];
        cell.className = "cell";
        var afterBirth = year > bY || (year === bY && c >= bM);
        var notFuture = year < nY || (year === nY && c <= nM);
        if (afterBirth && notFuture) cell.className = "cell lived";
        if (afterBirth && year === nY && c === nM) cell.className = "cell lived now";
      }
    }
  }

  function pad2(n) { return (n < 10 ? "0" : "") + n; }

  function start(iso) {
    birthISO = iso;
    try { localStorage.setItem(KEY, iso); } catch (e) {}
    intro.className = "intro hidden";
    resetB.hidden = false;
    layout();
    paint();
  }

  // diem / mensem / annum probare
  function validate(dd, mm, yy) {
    if (!dd || !mm || !yy) return { msg: "Comple diem, mensem et annum." };
    var day = +dd, mon = +mm, year = +yy;
    var now = new Date();
    var today = new Date(now.getFullYear(), now.getMonth(), now.getDate());

    if (year < 1900 || year > now.getFullYear())
      return { msg: "Annus inter 1900 et " + now.getFullYear() + " esse debet." };
    if (mon < 1 || mon > 12) return { msg: "Mensis inter 1 et 12 esse debet." };
    if (day < 1 || day > 31) return { msg: "Dies inter 1 et 31 esse debet." };

    var dt = new Date(year, mon - 1, day);
    if (dt.getFullYear() !== year || dt.getMonth() !== mon - 1 || dt.getDate() !== day)
      return { msg: "Ea dies non exsistit." };
    if (dt > today) return { msg: "Dies futura esse non potest." };

    return { iso: year + "-" + pad2(mon) + "-" + pad2(day) };
  }

  function bind() {
    var fields = [dayI, monI, yeaI];

    for (var k = 0; k < fields.length; k++) {
      (function (input, idx) {
        input.onkeydown = function (e) {
          if (e.keyCode === 8 && !input.value && idx > 0) fields[idx - 1].focus();
        };
        input.oninput = function () {
          input.value = input.value.replace(/\D/g, "");
          errorEl.textContent = "";
          input.className = "box";
          if (input.value.length >= +input.getAttribute("maxlength") && idx < fields.length - 1)
            fields[idx + 1].focus();
        };
      })(fields[k], k);
    }

    form.onsubmit = function (e) {
      e.preventDefault();
      var res = validate(dayI.value, monI.value, yeaI.value);
      if (res.iso) {
        start(res.iso);
      } else {
        errorEl.textContent = res.msg;
        for (var i = 0; i < fields.length; i++) fields[i].className = "box invalid";
      }
    };

    resetB.onclick = function () {
      try { localStorage.removeItem(KEY); } catch (e) {}
      birthISO = null;
      resetB.hidden = true;
      errorEl.textContent = "";
      intro.className = "intro";
      dayI.focus();
    };

    window.onresize = function () { layout(); paint(); };

    // pinch-zoom prohibere (duo digiti)
    document.addEventListener("touchmove", function (e) {
      if (e.touches.length > 1) e.preventDefault();
    }, { passive: false });
  }

  function init() {
    build();
    bind();
    var saved = null;
    try { saved = localStorage.getItem(KEY); } catch (e) {}
    if (saved && /^\d{4}-\d{2}-\d{2}$/.test(saved)) {
      yeaI.value = saved.substring(0, 4);
      monI.value = saved.substring(5, 7);
      dayI.value = saved.substring(8, 10);
      start(saved);
    } else {
      layout();
    }
  }

  init();
})();
</script>
</body>
</html>
