<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="description" content="Memento Mori: visualiza tu vida en 80 años, mes a mes.">
  <meta name="theme-color" content="#f7f6f4">
  <title>Memento Mori</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Pantalla principal: la cuadrícula de la vida -->
  <main class="app">
    <header class="head">
      <h1 class="title">MEMENTO MORI</h1>
      <p class="subtitle">Vivamos, ya que hemos de morir.</p>
    </header>

    <section class="chart">
      <div class="axis-top">
        <div class="corner"><small>MESES</small></div>
        <div class="months" id="months" aria-hidden="true"></div>
      </div>

      <div class="axis-main">
        <div class="years" id="years" aria-hidden="true"></div>
        <div class="grid-wrap">
          <div class="dots" id="dots" role="img" aria-label="Meses vividos de una vida de 80 años"></div>
        </div>
      </div>

      <p class="axis-caption">
        <span class="arrow">&larr;</span> AÑOS (1&ndash;80) <span class="arrow">&rarr;</span>
      </p>
    </section>

    <footer class="quote">
      <span class="mark">&ldquo;</span>
      <p>Cuando te levantes por la mañana, piensa en el privilegio tan precioso que es estar vivo: respirar, pensar, disfrutar, amar.</p>
      <span class="author">MARCO AURELIO</span>
    </footer>
  </main>

  <button class="reset" id="reset" type="button" hidden>fecha</button>

  <!-- Pantalla de inicio: fecha de nacimiento -->
  <div class="intro" id="intro">
    <h1 class="title">MEMENTO MORI</h1>
    <p class="subtitle">Vivamos, ya que hemos de morir.</p>

    <form class="intro-form" id="form" novalidate>
      <div class="date-fields">
        <label class="field">
          <input class="box" id="day" inputmode="numeric" maxlength="2"
                 placeholder="DD" autocomplete="off" aria-label="Día">
          <span class="flabel">DÍA</span>
        </label>
        <span class="sep">/</span>
        <label class="field">
          <input class="box" id="month" inputmode="numeric" maxlength="2"
                 placeholder="MM" autocomplete="off" aria-label="Mes">
          <span class="flabel">MES</span>
        </label>
        <span class="sep">/</span>
        <label class="field field--year">
          <input class="box" id="year" inputmode="numeric" maxlength="4"
                 placeholder="AAAA" autocomplete="off" aria-label="Año">
          <span class="flabel">AÑO</span>
        </label>
      </div>
      <p class="error" id="error" role="alert"></p>
      <button type="submit">Comenzar</button>
    </form>
  </div>

  <script src="app.js"></script>
</body>
</html>
