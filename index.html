<!DOCTYPE html>
<html lang="la">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="description" content="Memento mori: vitam tuam per octoginta annos, mensem post mensem, contemplare.">
  <meta name="theme-color" content="#f7f6f4">
  <title>Memento Mori</title>

  <style>
    /* ================================================================ *
     * Memento Mori — pagina una, sine ope externa (HTML/CSS/JS purus).
     * Forma verticalis telephono apta: anni in axe verticali, menses
     * in horizontali. Omnia in schermo, sine volumine (nulla scroll).
     * ================================================================ */

    :root {
      --ink:   #111;
      --paper: #f7f6f4;
      --ring:  #b9b7b2;
      --muted: #666;
      --error: #b23a3a;
      --dot:   6px;               /* a JavaScript pro spatio recomputatur */
      --gutter: 2.1em;
      font-size: clamp(11px, 3.4vw, 15px);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { width: 100%; height: 100%; overflow: hidden; }

    body {
      background: var(--paper);
      color: var(--ink);
      font-family: Georgia, "Times New Roman", serif;
      -webkit-font-smoothing: antialiased;
      display: flex;
      justify-content: center;
    }

    /* ----- typographia communis ----- */
    .title {
      text-align: center;
      font-weight: 700;
      letter-spacing: .42em;
      padding-left: .42em;          /* spatium finale pensat */
      line-height: 1;
    }
    .subtitle {
      text-align: center;
      font-style: italic;
      color: #2a2a2a;
    }

    /* ================================================================ *
     * Schermum principale — tabula vitae
     * ================================================================ */
    .app {
      width: 100%;
      max-width: 460px;
      height: 100dvh;
      padding: calc(env(safe-area-inset-top) + 1.1rem) .9rem
               calc(env(safe-area-inset-bottom) + .8rem);
      display: flex;
      flex-direction: column;
    }

    .head .title { font-size: 1.9rem; }
    .head .subtitle { font-size: .98rem; margin-top: .5rem; }

    /* ----- tabula punctorum ----- */
    .chart {
      flex: 1 1 auto;
      min-height: 0;
      display: flex;
      flex-direction: column;
      margin-top: 1.05rem;
    }

    .axis-top { display: flex; align-items: flex-end; }
    .corner { flex: 0 0 var(--gutter); width: var(--gutter); text-align: center; }
    .corner small {
      display: block;
      font-size: .5rem;
      letter-spacing: .12em;
      color: var(--muted);
      transform: translateY(-2px);
    }
    .months {
      flex: 1 1 auto;
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      text-align: center;
      font-size: .58rem;
      color: #555;
      padding-bottom: .28rem;
    }

    .axis-main { flex: 1 1 auto; min-height: 0; display: flex; }
    .years {
      flex: 0 0 var(--gutter);
      width: var(--gutter);
      display: grid;
      grid-template-rows: repeat(80, 1fr);
      font-size: .56rem;
      color: #555;
    }
    .years b {
      grid-column: 1;
      align-self: center;
      justify-self: end;
      padding-right: .35rem;
      font-weight: 400;
    }

    .grid-wrap { flex: 1 1 auto; min-width: 0; }
    .dots {
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      grid-template-rows: repeat(80, 1fr);
    }
    .cell { display: flex; align-items: center; justify-content: center; }
    .cell i {
      width: var(--dot);
      height: var(--dot);
      border-radius: 50%;
      border: 1px solid var(--ring);
      background: transparent;
      transition: background .18s ease, border-color .18s ease;
    }
    .cell.lived i { background: var(--ink); border-color: var(--ink); }
    .cell.now i {
      background: var(--ink);
      border-color: var(--ink);
      box-shadow: 0 0 0 2px var(--paper), 0 0 0 3px var(--ink);
    }

    .axis-caption {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .6rem;
      margin-top: .55rem;
      padding-left: .28em;
      font-size: .66rem;
      letter-spacing: .28em;
      color: #333;
    }
    .axis-caption .arrow { color: #888; font-size: .8rem; }

    /* ----- sententia ----- */
    .quote { text-align: center; margin-top: .7rem; }
    .quote .mark { display: block; font-size: 1.4rem; line-height: .4; }
    .quote p {
      margin-top: .35rem;
      padding: 0 .3rem;
      font-style: italic;
      font-size: .86rem;
      line-height: 1.35;
    }
    .quote .author {
      display: block;
      margin-top: .6rem;
      font-size: .62rem;
      letter-spacing: .34em;
      padding-left: .34em;
      color: #333;
    }

    /* ----- pyxis occulta ut dies mutetur ----- */
    .reset {
      position: fixed;
      top: calc(env(safe-area-inset-top) + 6px);
      right: 10px;
      border: none;
      background: none;
      font-family: inherit;
      font-size: .6rem;
      letter-spacing: .1em;
      color: #b3b1ac;
      cursor: pointer;
    }
    .reset:hover { color: var(--muted); }

    /* ================================================================ *
     * Schermum initiale (dies natalis) — minimum, in albo
     * ================================================================ */
    .intro {
      position: fixed;
      inset: 0;
      z-index: 20;
      background: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      padding: 2rem 1.4rem calc(env(safe-area-inset-bottom) + 2rem);
    }
    .intro.hidden { display: none; }

    .intro .title { font-size: clamp(1.4rem, 6.4vw, 1.95rem); }
    .intro .subtitle { font-size: 1.02rem; margin-top: -1.1rem; }

    .intro-form {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.2rem;
      margin-top: 1.2rem;
      width: 100%;
      max-width: 360px;
    }

    /* pyxides diei / mensis / anni */
    .date-fields {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      gap: .3rem;
      width: 100%;
      font-size: clamp(1.35rem, 6.8vw, 2rem);   /* pyxides scalat */
    }
    .field {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .55rem;
    }
    .box {
      width: 2.3em;
      font-family: inherit;
      font-size: 1em;
      line-height: 1;
      color: var(--ink);
      text-align: center;
      background: #fff;
      border: 1px solid #e2e0db;
      border-radius: 3px;
      padding: .38em 0;
      transition: border-color .18s ease;
    }
    .field--year .box { width: 3.7em; }
    .box::placeholder { color: #cfccc6; letter-spacing: .02em; }
    .box:focus { outline: none; border-color: var(--ink); }
    .box.invalid { border-color: var(--error); }
    .flabel {
      font-size: .58rem;
      letter-spacing: .24em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .sep {
      align-self: center;
      margin-top: .45em;
      font-size: .95em;
      color: #d8d6d1;
    }

    .error {
      min-height: 1.1em;
      font-style: italic;
      font-size: .82rem;
      color: var(--error);
      text-align: center;
    }

    .intro-form button {
      font-family: inherit;
      font-size: .78rem;
      letter-spacing: .34em;
      text-transform: uppercase;
      padding: .25rem 0 .35rem;
      padding-left: .34em;
      border: none;
      border-bottom: 1px solid var(--ink);
      background: none;
      color: var(--ink);
      cursor: pointer;
    }
    .intro-form button:hover { opacity: .55; }
  </style>
</head>

<body>

  <!-- Schermum principale: tabula vitae -->
  <main class="app">
    <header class="head">
      <h1 class="title">MEMENTO MORI</h1>
      <p class="subtitle">Vivamus, quia moriendum est.</p>
    </header>

    <section class="chart">
      <div class="axis-top">
        <div class="corner"><small>MENSES</small></div>
        <div class="months" id="months" aria-hidden="true"></div>
      </div>

      <div class="axis-main">
        <div class="years" id="years" aria-hidden="true"></div>
        <div class="grid-wrap">
          <div class="dots" id="dots" role="img" aria-label="Menses vitae per octoginta annos acti"></div>
        </div>
      </div>

      <p class="axis-caption">
        <span class="arrow">&larr;</span> ANNI (1&ndash;80) <span class="arrow">&rarr;</span>
      </p>
    </section>

    <footer class="quote">
      <span class="mark">&ldquo;</span>
      <p>Cum mane surrexeris, cogita quam pretiosum sit munus vivere: spirare, cogitare, frui, amare.</p>
      <span class="author">MARCUS AURELIUS</span>
    </footer>
  </main>

  <button class="reset" id="reset" type="button" hidden>mutare</button>

  <!-- Schermum initiale: dies natalis -->
  <div class="intro" id="intro">
    <h1 class="title">MEMENTO MORI</h1>
    <p class="subtitle">Vivamus, quia moriendum est.</p>

    <form class="intro-form" id="form" novalidate>
      <div class="date-fields">
        <label class="field">
          <input class="box" id="day" inputmode="numeric" maxlength="2"
                 placeholder="DD" autocomplete="off" aria-label="Dies">
          <span class="flabel">DIES</span>
        </label>
        <span class="sep">/</span>
        <label class="field">
          <input class="box" id="month" inputmode="numeric" maxlength="2"
                 placeholder="MM" autocomplete="off" aria-label="Mensis">
          <span class="flabel">MENSIS</span>
        </label>
        <span class="sep">/</span>
        <label class="field field--year">
          <input class="box" id="year" inputmode="numeric" maxlength="4"
                 placeholder="AAAA" autocomplete="off" aria-label="Annus">
          <span class="flabel">ANNUS</span>
        </label>
      </div>
      <p class="error" id="error" role="alert"></p>
      <button type="submit">Incipe</button>
    </form>
  </div>

  <script>
  /* ================================================================== *
   * Ratio applicationis.
   *
   * Quodque punctum unus mensis vitae octoginta annorum est
   * (80 × 12 = 960 menses). Ordines sunt anni (axis verticalis),
   * columnae menses (axis horizontalis). Menses iam acti implentur ex
   * die natali, qui in localStorage servatur.
   * ================================================================== */
  (function () {
    "use strict";

    var YEARS = 80;
    var MONTHS = 12;
    var TOTAL = YEARS * MONTHS;
    var STORAGE_KEY = "mementoMori.birth";

    var el = {
      months: document.getElementById("months"),
      years:  document.getElementById("years"),
      dots:   document.getElementById("dots"),
      intro:  document.getElementById("intro"),
      form:   document.getElementById("form"),
      day:    document.getElementById("day"),
      month:  document.getElementById("month"),
      year:   document.getElementById("year"),
      error:  document.getElementById("error"),
      reset:  document.getElementById("reset")
    };

    var cells = [];

    /* ----- tabulam semel aedificare ----- */
    function build() {
      var frag, i;

      // tituli mensium (1..12) supra axem horizontalem
      frag = document.createDocumentFragment();
      for (i = 1; i <= MONTHS; i++) {
        var span = document.createElement("span");
        span.textContent = i;
        frag.appendChild(span);
      }
      el.months.appendChild(frag);

      // tituli annorum (per decades) ad axem verticalem
      frag = document.createDocumentFragment();
      for (i = 1; i <= YEARS; i++) {
        var b = document.createElement("b");
        b.style.gridRow = i;
        b.textContent = (i % 10 === 0) ? i : "";
        frag.appendChild(b);
      }
      el.years.appendChild(frag);

      // puncta: ordo = annus (desuper deorsum), columna = mensis
      frag = document.createDocumentFragment();
      for (i = 0; i < TOTAL; i++) {
        var cell = document.createElement("div");
        cell.className = "cell";
        cell.appendChild(document.createElement("i"));
        frag.appendChild(cell);
        cells.push(cell);
      }
      el.dots.appendChild(frag);
    }

    /* ----- puncta rotunda et intra cellulam servare ----- */
    function sizeDots() {
      var w = el.dots.clientWidth;
      var h = el.dots.clientHeight;
      if (!w || !h) return;
      var d = Math.max(3, Math.floor(Math.min(w / MONTHS, h / YEARS) * 0.66));
      document.documentElement.style.setProperty("--dot", d + "px");
    }

    /* ----- menses pleni ex die natali acti ----- */
    function monthsLived(birthISO) {
      var birth = new Date(birthISO + "T00:00:00");
      var now = new Date();
      var m = (now.getFullYear() - birth.getFullYear()) * 12 +
              (now.getMonth() - birth.getMonth());
      if (now.getDate() < birth.getDate()) m--;   // mensis nondum completus
      return Math.max(0, m);
    }

    /* ----- statum cuiusque puncti pingere ----- */
    function paint(birthISO) {
      var lived = Math.min(monthsLived(birthISO), TOTAL);
      for (var i = 0; i < cells.length; i++) {
        cells[i].className = "cell" + (i < lived ? " lived" : "");
      }
      if (lived > 0 && lived <= TOTAL) cells[lived - 1].classList.add("now");
    }

    /* ----- cum die incipere ----- */
    function start(birthISO) {
      localStorage.setItem(STORAGE_KEY, birthISO);
      el.intro.classList.add("hidden");
      el.reset.hidden = false;
      sizeDots();
      paint(birthISO);
    }

    function pad2(n) { return String(n).padStart(2, "0"); }

    /* ----- diem / mensem / annum probare ----- */
    function validate(dd, mm, yy) {
      if (!dd || !mm || !yy) {
        return { ok: false, msg: "Comple diem, mensem et annum." };
      }
      var day = +dd, mon = +mm, year = +yy;
      var now = new Date();
      var today = new Date(now.getFullYear(), now.getMonth(), now.getDate());

      if (year < 1900 || year > now.getFullYear()) {
        return { ok: false, msg: "Annus inter 1900 et " + now.getFullYear() + " esse debet." };
      }
      if (mon < 1 || mon > 12) {
        return { ok: false, msg: "Mensis inter 1 et 12 esse debet." };
      }
      if (day < 1 || day > 31) {
        return { ok: false, msg: "Dies inter 1 et 31 esse debet." };
      }
      // dies vera (reicit 31/02, etc.)
      var dt = new Date(year, mon - 1, day);
      if (dt.getFullYear() !== year || dt.getMonth() !== mon - 1 || dt.getDate() !== day) {
        return { ok: false, msg: "Ea dies non exsistit." };
      }
      if (dt > today) {
        return { ok: false, msg: "Dies futura esse non potest." };
      }
      return { ok: true, iso: year + "-" + pad2(mon) + "-" + pad2(day) };
    }

    /* ----- eventus ----- */
    function bind() {
      var fields = [el.day, el.month, el.year];

      fields.forEach(function (input, idx) {
        // solae cifrae + progressus automaticus dum pyxis impletur
        input.addEventListener("input", function () {
          input.value = input.value.replace(/\D/g, "");
          el.error.textContent = "";
          input.classList.remove("invalid");
          var max = +input.getAttribute("maxlength");
          if (input.value.length >= max && idx < fields.length - 1) {
            fields[idx + 1].focus();
          }
        });
        // regressus ad pyxidem priorem si vacua est
        input.addEventListener("keydown", function (e) {
          if (e.key === "Backspace" && !input.value && idx > 0) {
            fields[idx - 1].focus();
          }
        });
      });

      el.form.addEventListener("submit", function (e) {
        e.preventDefault();
        var res = validate(el.day.value, el.month.value, el.year.value);
        if (res.ok) {
          start(res.iso);
        } else {
          el.error.textContent = res.msg;
          fields.forEach(function (f) { f.classList.add("invalid"); });
        }
      });

      el.reset.addEventListener("click", function () {
        localStorage.removeItem(STORAGE_KEY);
        el.reset.hidden = true;
        el.error.textContent = "";
        el.intro.classList.remove("hidden");
        el.day.focus();
      });

      window.addEventListener("resize", sizeDots);
    }

    /* ----- initium ----- */
    function init() {
      build();
      bind();
      var saved = localStorage.getItem(STORAGE_KEY);
      if (saved && /^\d{4}-\d{2}-\d{2}$/.test(saved)) {
        var parts = saved.split("-");
        el.year.value = parts[0];
        el.month.value = parts[1];
        el.day.value = parts[2];
        start(saved);
      } else {
        sizeDots();   // tabulam post schermum initiale paratam relinquit
      }
    }

    init();
  })();
  </script>
</body>
</html>
